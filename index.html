<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Финансовый трекер</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="manifest" href="manifest.json" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <div class="app">
      <div id="home-page" class="page">
        <h1>Мои финансы</h1>
        <div class="balance">
          <h2>Траты: <span id="balance">0</span> ₽</h2>
        </div>

        <div class="flex-container">
          <select name="chart-target" id="chart-target">
            <option value="category" selected>категория</option>
            <option value="rate">трата</option>
            <option value="tags">тег</option>
          </select>
        </div>

        <div class="charts">
          <div class="chart-container">
            <canvas id="chart"></canvas>
          </div>
        </div>
        <div class="flex-container">
          <select name="transactions-limit" id="transactions-limit">
            <option value="all" selected></option>
            <option value="month">month</option>
            <option value="week">week</option>
            <option value="day">day</option>
            <option value="year">year</option>
            <option value="custom">custom period</option>
          </select>
        </div>
        <div id="custom-period-inputs" style="display: none; margin: 10px 0;">
          <label>Начальная дата: <input type="date" id="custom-start-date" /></label>
          <label>Конечная дата: <input type="date" id="custom-end-date" /></label>
        </div>

        <ul id="transactions"></ul>
      </div>
      <div id="export-page" class="page">
        <h3>Экспорт / Импорт данных</h3>
        <div id="export-section">
          <h4>Экспорт</h4>
          <button id="export-btn">Экспорт данных</button>
          <p id="export-status"></p>
        </div>
        <div id="import-section">
          <h4>Импорт</h4>
          <input id="input-json" type="file" accept=".json" />
          <button id="import-btn">Импортировать данные</button>
          <p id="import-status"></p>
        </div>
        <div id="settings-section">
          <h4>Настройки</h4>
          <label>Тег по умолчанию:
            <input type="text" id="default-tag-input" placeholder="Введите тег" />
          </label>
          <button id="default-tag-save-btn">Сохранить</button>
          <p id="default-tag-status"></p>
        </div>
        <div id="rename-tag-section">
          <h4>Переименовать тег</h4>
          <label>Текущий тег:</label>
          <div style="position: relative">
            <input type="text" id="rename-tag-from" placeholder="Введите тег" autocomplete="off" />
            <div id="rename-tag-from-suggestion" class="suggestion" style="display:none"></div>
          </div>
          <div id="rename-tag-stats" style="display:none"></div>
          <label>Новый тег:</label>
          <input type="text" id="rename-tag-to" placeholder="Новое название" autocomplete="off" />
          <div id="rename-tag-warning" style="display:none"></div>
          <button id="rename-tag-btn">Переименовать</button>
          <p id="rename-tag-status"></p>
        </div>
      </div>
      <div id="input-page" class="page">
        <form id="transaction-form">
          <input type="text" id="description" placeholder="Описание" required />
          <input type="number" id="amount" placeholder="Сумма" required />
          <div class="suggestion" style="display: none" id="category-suggestion"></div>
          <input id="category-input" placeholder="Категория" required />
          <select name="rate" id="rate-select">
            <option value="waste">плохая</option>
            <option value="ok" selected>ок</option>
            <option value="good">осознанная</option>
          </select>

          <div class="tags-input">
            <div class="suggestion" style="display: none" id="tag-suggestion"></div>
            <input type="text" id="tag-input" placeholder="Добавить тег" />
            <button type="button" id="add-tag">+</button>
            <div id="tags-container"></div>
          </div>

          <button type="submit">Добавить</button>
        </form>
      </div>
    </div>

    <nav class="bottom-nav">
      <a href="#" class="nav-item active" data-page="home">
        <span class="icon">🏠</span>
        <span class="label">Главная</span>
      </a>
      <a href="#" class="nav-item" data-page="export">
        <span class="icon">⚙</span>
        <span class="label">Настройки</span>
      </a>
      <a href="#" class="nav-item" data-page="input">
        <span class="icon">+</span>
        <span class="label">Добавить</span>
      </a>
    </nav>
    <div id="modal" class="modal">
      <div class="modal-content">
        <span class="close-btn">&times;</span>
        <h2 id="modal-title">Заголовок</h2>
        <div id="modal-body"></div>
      </div>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
